name: refresh

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync

      - name: Rebuild data warehouse
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run python -m pipeline.build_duckdb

      - name: Build modeling panel
        run: uv run python -m pipeline.build_panel

      - name: Generate forecast + model card
        run: uv run python -m pipeline.generate_forecast

      - name: Commit refreshed artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/forecast.json backend/data/model_card.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(data): daily forecast refresh"
            git push
          fi