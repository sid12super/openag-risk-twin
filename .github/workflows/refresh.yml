# .github/workflows/refresh.yml
name: refresh
on:
  schedule:
    - cron: "17 23 * * 1-5"   # 23:17 UTC weekdays — offset off the top of the hour
  workflow_dispatch: {}        # lets you trigger it by hand to test
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run python pipeline/generate_forecast.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      - name: Commit generated forecast and model card if changed
        run: |
          git config user.name "OpenAg Bot"
          git config user.email "bot@openag.local"

          # Check if backend/data/*.json files changed
          if git diff --quiet backend/data/; then
            echo "No changes to forecast data; skipping commit."
          else
            git add backend/data/forecast.json backend/data/model_card.json
            git commit -m "chore: regenerate forecast and model card" || echo "Nothing to commit"
            git push
          fi