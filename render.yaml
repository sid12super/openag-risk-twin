services:
  - type: web
    name: openag-api
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"