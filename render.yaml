services:
  - type: web
    name: openag-risk-twin-api
    runtime: python
    pythonVersion: 3.13
    buildCommand: uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGIN_REGEX
        value: r"https://.*\.vercel\.app|https://openag-risk-twin\.vercel\.app"
